name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔹 Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          echo "Installing backend..."
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || echo "Backend install failed"
          elif [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt || echo "Backend install failed"
          else
            echo "No backend requirements found"
          fi

      # 🔹 Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          echo "Installing frontend..."
          if [ -f package.json ]; then
            npm install || echo "Frontend install failed"
          elif [ -f frontend/package.json ]; then
            cd frontend
            npm install || echo "Frontend install failed"
          else
            echo "No frontend found"
          fi

      - name: Build frontend
        run: |
          echo "Building frontend..."
          if [ -f package.json ]; then
            npm run build || echo "Build skipped"
          elif [ -f frontend/package.json ]; then
            cd frontend
            npm run build || echo "Build skipped"
          fi

      - name: Done
        run: echo "Pipeline completed"
