name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python (for Flask backend)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install backend dependencies
      - name: Install backend dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            echo "No backend requirements found"
          fi

      # 4. Setup Node.js (for React frontend)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 5. Install frontend dependencies
      - name: Install frontend dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          elif [ -f frontend/package.json ]; then
            cd frontend
            npm install
          else
            echo "No frontend package.json found"
          fi

      # 6. Build frontend (optional but good)
      - name: Build frontend
        run: |
          if [ -f package.json ]; then
            npm run build || echo "No build script"
          elif [ -f frontend/package.json ]; then
            cd frontend
            npm run build || echo "No build script"
          fi

      # 7. Final check
      - name: Pipeline success
        run: echo "CI/CD pipeline executed successfully"
